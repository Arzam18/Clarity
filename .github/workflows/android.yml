name: Clarity

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build
        run: |
          make CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang++ \
               CXXFLAGS="-std=c++20 -fexceptions -Wall -Wextra -pthread -O3 -DNDEBUG -DNetworkFile=\\\"cn_031.nnue\\\" --target=aarch64-linux-android28 -march=armv8-a"

      - name: List build output
        run: |
          find . -maxdepth 1 -type f -executable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clarity-android-arm64
          path: Clarity

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Clarity Build ${{ github.run_number }}
          prerelease: true
          files: Clarity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
